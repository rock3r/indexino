name: Native distributions

on:
  workflow_dispatch:
  # Temporary D5 source validation; removed after the first full green matrix.
  push:
    branches: [feat/native-cli-d5-release-readiness]

permissions:
  contents: read

jobs:
  verify-native:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
            task_suffix: LinuxX64
            verification_task: verifyNativeDistributionLinuxX64
            checksum_task: sha256NativeDistributionLinuxX64
          - target: macos-arm64
            runner: macos-15
            task_suffix: MacArm64
            verification_task: verifyNativeDistributionMacArm64
            checksum_task: sha256NativeDistributionMacArm64
          - target: windows-x64
            runner: windows-2022
            task_suffix: WindowsX64
            verification_task: verifyNativeDistributionWindowsX64
            checksum_task: sha256NativeDistributionWindowsX64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Read immutable native input pins
        id: pins
        shell: bash
        run: .github/scripts/native-archive-cache.sh emit-pins "${{ matrix.target }}" >> "$GITHUB_OUTPUT"
      - name: Restore verified JBR and Roast archives
        uses: actions/cache@v4
        with:
          path: ${{ steps.pins.outputs.cache_path }}
          key: native-inputs-${{ runner.os }}-${{ matrix.target }}-${{ steps.pins.outputs.cache_key }}
      - name: Verify native distribution
        shell: bash
        run: |
          mkdir -p "build/ci-logs/${{ matrix.target }}"
          set -o pipefail
          .github/scripts/native-archive-cache.sh run \
            "${{ matrix.target }}" .native-download-cache -- \
            ./gradlew \
              "${{ matrix.verification_task }}" \
              "${{ matrix.checksum_task }}" \
              --no-daemon --console=plain 2>&1 | \
            tee "build/ci-logs/${{ matrix.target }}/verification.log"
      - name: Smoke oldest supported Linux baseline (ubuntu:22.04 / glibc 2.35)
        if: matrix.target == 'linux-x64'
        shell: bash
        run: scripts/smoke-linux-baseline.sh build/distributions/*.zip ubuntu:22.04
      - name: Upload native distribution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            build/distributions/*.zip
            build/distributions/*.sha256
            build/ci-logs
            build/reports/native-distributions
            build/test-results/verifyNativeDistribution${{ matrix.task_suffix }}
          if-no-files-found: warn
          retention-days: 7
