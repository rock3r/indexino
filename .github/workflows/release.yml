name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Verify and publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tag must be SemVer-shaped: v<major>.<minor>.<patch>[-prerelease][+metadata]" >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run release checks
        run: |
          ./gradlew check verifyMavenPublication \
            -PVERSION_NAME="${{ steps.version.outputs.version }}"

      - name: Publish signed artifacts to Sonatype Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          test -n "$ORG_GRADLE_PROJECT_mavenCentralUsername"
          test -n "$ORG_GRADLE_PROJECT_mavenCentralPassword"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKey"
          test -n "$ORG_GRADLE_PROJECT_signingInMemoryKeyPassword"
          ./gradlew publishToMavenCentral \
            -PVERSION_NAME="${{ steps.version.outputs.version }}"
